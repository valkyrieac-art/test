<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Arcade Games</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111318;
        --panel: #1b2028;
        --text: #eef2f6;
        --muted: #9aa6b2;
        --line: #384150;
        --accent: #37d0a5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background: linear-gradient(135deg, #111318, #191c22 52%, #101216);
        color: var(--text);
        display: flex;
        font-family: Arial, Helvetica, sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 20px;
      }

      main {
        max-width: 860px;
        width: 100%;
      }

      h1 {
        font-size: 34px;
        margin: 0 0 18px;
      }

      .games {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      a {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        display: block;
        min-height: 126px;
        padding: 18px;
        text-decoration: none;
      }

      a:hover {
        border-color: var(--accent);
      }

      strong {
        display: block;
        font-size: 22px;
        margin-bottom: 10px;
      }

      span {
        color: var(--muted);
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Arcade Games</h1>
      <section class="games" aria-label="Game list">
        <a href="tetris.html">
          <strong>Tetris Versus</strong>
          <span>1P vs CPU or 2P battle Tetris.</span>
        </a>
        <a href="pang.html">
          <strong>Pang Duel</strong>
          <span>Two-player bouncing ball arcade game.</span>
        </a>
        <a href="trap-race.html">
          <strong>Trap Race Duo</strong>
          <span>Two-player platform race with traps and items.</span>
        </a>
      </section>
    </main>
  </body>
</html>
