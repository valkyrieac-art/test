<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테트리스</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="board-wrap">
        <canvas id="game" width="300" height="600" aria-label="테트리스 게임 보드"></canvas>
      </section>
      <aside class="panel">
        <h1>테트리스</h1>
        <div class="stat"><span>점수</span><strong id="score">0</strong></div>
        <div class="stat"><span>레벨</span><strong id="level">1</strong></div>
        <div class="stat"><span>라인</span><strong id="lines">0</strong></div>

        <h2>조작법</h2>
        <ul>
          <li>← / → : 이동</li>
          <li>↑ : 회전</li>
          <li>↓ : 소프트 드롭</li>
          <li>Space : 하드 드롭</li>
          <li>P : 일시정지</li>
        </ul>

        <button id="restart">다시 시작</button>
        <p id="message" class="message"></p>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
